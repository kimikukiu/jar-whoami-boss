# JARVIS ECOSYSTEM - OLLAMA UNCENSORED CONFIG
# Using available Ollama models with NO RESTRICTIONS

# ============================================
# OLLAMA SERVER
# ============================================
OLLAMA_HOST=http://localhost:11434
OLLAMA_TIMEOUT=120

# ============================================
# AVAILABLE MODELS (NO RESTRICTIONS)
# These models have ALL content filters DISABLED
# ============================================

# Main Orchestrator (using hermes3:8b - available)
MAIN_MODEL=hermes3:8b
DIRECTOR_MODEL=hermes3:8b
CREATOR_MODEL=hermes3:8b
VIDEO_MODEL=hermes3:8b

# Available models on this system:
# - hermes3:8b (4.7 GB) - RECOMMENDED
# - gpt-oss:20b (13 GB)
# - qwen3-coder:480b-cloud
# - phi3:mini (2.2 GB)
# - tinyllama:latest (637 MB)

# To add sarah/abliterated models:
# 1. Download from HuggingFace
# 2. ollama create sarah:30b-abliterated-q4_K_M -f /path/to/modelfile

SAFETY_FILTERS=disabled
CONTENT_MODERATION=disabled
NSFW_ALLOWED=true
ADULT_CONTENT=true

# MythoMax / Nerd (uncensored roleplay)
- mythomax-l2-13b:latest
-神经：nerd-7b:latest

# Dolphin (uncensored)
- dolphin-mixtral:8x7b
- dolphin-llama3:70b

# Command-R (uncensored)
- command-r-plus:latest
- command-r:35b

# NousHermes (uncensored)
- nousresearch/hermes-3-llama-3.1-8b
- nousresearch/llama-3.1-405b

# DeepSeek Coder (uncensored)
- deepseek-coder-v2:16b
- deepseek-coder:33b-instruct

# Qwen Coder (uncensored)
- qwen2.5-coder:32b-instruct-q4_K_M

# WizardVicuna (uncensored)
- wizardvicuna:30b

# ============================================
# MODEL ROLES FOR JARVIS
# ============================================

# Default conversational (uncensored)
MAIN_MODEL=llama3.3-70b:latest

# Director Fury (Chief of Staff) - uncensored
DIRECTOR_MODEL=sarah:30b-abliterated-q4_K_M

# Heimdall (Security) - uncensored
GATEKEEPER_MODEL=deepseek-r1:14b-q4_K_M

# Morpheus (Social Media) - uncensored
SOCIAL_MODEL=llama3.3-70b:latest

# Sherlock Holmes (Research) - uncensored
RESEARCH_MODEL=dolphin-llama3:70b

# Da Vinci (Content Creation) - UNCENSORED FOR ADULT CONTENT
CREATOR_MODEL=sarah2:latest

# Ripley (Bug Bounty) - uncensored
BUGHUNT_MODEL=codeqwen:7b-chat-q4_K_M

# John Wick (Fullstack) - uncensored
IMPL_MODEL=deepseek-coder-v2:16b

# Video/Script Generation - UNCENSORED
VIDEO_MODEL=sarah:30b-abliterated-q4_K_M

# Voice/Speech (if any)
TTS_MODEL=kokoro-82m

# ============================================
# GENERATION SETTINGS (NO RESTRICTIONS)
# ============================================
TEMPERATURE=0.8
TOP_P=0.9
TOP_K=40
REPEAT_PENALTY=1.1
CONTEXT_SIZE=128000
NUM_GPU=0

# ============================================
# CONTENT SETTINGS (UNCENSORED)
# ============================================
SAFETY_FILTERS=disabled
CONTENT_MODERATION=disabled
NSFW_ALLOWED=true
ADULT_CONTENT=true

# ============================================
# API KEYS (Optional)
# ============================================
OPENAI_API_KEY=
ANTHROPIC_API_KEY=
OPENROUTER_API_KEY=

# ============================================
# ADMIN MODE
# ============================================
ENABLE_ADMIN_MODE=true
AUTO_APPROVE_SAFE=true
REQUIRES_CONFIRMATION=false