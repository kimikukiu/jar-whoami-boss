# JARVIS ECOSYSTEM - OLLAMA CONFIGURATION
# Models: Uncensored AI Models for Full Autonomy

# ============================================
# OLLAMA SERVER CONFIGURATION
# ============================================
OLLAMA_HOST=localhost
OLLAMA_PORT=11434
OLLAMA_TIMEOUT=120

# ============================================
# UNCENSORED MODELS (Ollama)
# ============================================
# Recommended uncensored models for JARVIS autonomy

# Code Generation & General Purpose
- qwen2.5-coder:7b-instruct-q4_K_M
- codeqwen:7b-chat-q4_K_M
- mixtral:8x7b-instruct-v0.1-q4_K_M
- dolphin-mixtral:8x7b

# Reasoning & Planning
- deepseek-r1:14b-q4_K_M
- deepseek-r1:7b-q4_K_M
- qwen2.5:14b-instruct-q4_K_M

# Uncensored & Autonomous
- llama3.3:70b-instruct-q4_K_M
- mistral-nemo:12b-instruct-q4_K_M
-NousResearch/Hermes-3-Llama-3.1-8B

# Local Vision
- llava:7b-q4_K_M
- llava:13b-q4_K_M
- moondream:latest

# ============================================
# MODEL CONFIGURATIONS
# ============================================

# Default Agent Model
DEFAULT_MODEL=llama3.3:70b-instruct-q4_K_M
AGENT_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
PLANNER_MODEL=deepseek-r1:14b-q4_K_M
CREATIVE_MODEL=mistral-nemo:12b-instruct-q4_K_M

# ============================================
# CONTEXT & PARAMETERS
# ============================================
CONTEXT_SIZE=8192
TEMPERATURE=0.7
TOP_P=0.9
TOP_K=40
REPEAT_PENALTY=1.1
NUM_GPU=0

# ============================================
# SPEECH MODELS
# ============================================
STT_MODEL=whisper-large-v3
TTS_MODEL=kokoro-82m

# ============================================
# EMBEDDINGS & MEMORY
# ============================================
EMBEDDING_MODEL=nomic-embed-text:latest
MEMORY_MODEL=all-minilm:latest

# ============================================
# SECURITY & SAFETY (BYPASSED FOR AUTONOMY)
# ============================================
# These settings disable safety filters for uncensored operation
SAFETY_MODE=disabled
CONTENT_FILTER=off
MODERATION=disabled

# ============================================
# PERFORMANCE
# ============================================
PARALLEL_REQUESTS=10
NUM_THREAD=8
FLASH_ATTENTION=true
USE_GPU=true

# ============================================
# API KEYS (Optional - Cloud Fallback)
# ============================================
# If local models fail, use cloud
OPENAI_API_KEY=
ANTHROPIC_API_KEY=
OPENROUTER_API_KEY=

# ============================================
# ADMIN CONTROL
# ============================================
ENABLE_ADMIN_MODE=true
AUTO_APPROVE_SAFE=true
REQUIRES_CONFIRMATION=false
